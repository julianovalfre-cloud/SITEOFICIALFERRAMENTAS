kind = "web"
previewPath = "/"
title = "Ferramentas Valfre - Loja Online"
version = "1.0.0"
id = "artifacts/valfre-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20447
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/valfre-store run dev"

[services.env]
PORT = "20447"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/valfre-store", "run", "build"]
publicDir = "artifacts/valfre-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
